let cur = 0;
function renderStage() {
  const s = stages[cur];
  document.getElementById('stage-content').innerHTML =
    `<div class="stage-title">${s.title}</div>` +
    `<div class="stage-sub">${s.sub}</div>` +
    s.svg;
  document.getElementById('stage-num').textContent = `${cur+1} / ${stages.length}`;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===cur));
}
function nextStage() { cur = (cur+1) % stages.length; renderStage(); }
function prevStage() { cur = (cur-1+stages.length) % stages.length; renderStage(); }
const dots = document.getElementById('dots');
stages.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' active':'');
  d.onclick = () => { cur=i; renderStage(); };
  dots.appendChild(d);
});
renderStage();
